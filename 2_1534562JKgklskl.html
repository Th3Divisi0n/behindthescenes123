  .overlay { position: fixed; inset: 0; background: rgba(0,0,0,0.45); }
  .scanlines {
    position: fixed; inset: 0;
    background: repeating-linear-gradient(0deg, transparent, transparent 2px, rgba(0,0,0,0.12) 2px, rgba(0,0,0,0.12) 4px);
    pointer-events: none;
  }
  .vignette {
    position: fixed; inset: 0;
    background: radial-gradient(ellipse at center, transparent 30%, rgba(0,0,0,0.92) 100%);
    pointer-events: none;
  }
  .ui {
    position: fixed; inset: 0;
    display: flex; flex-direction: column;
    align-items: center; justify-content: flex-end;
    padding-bottom: 12vh;
    gap: 1rem; z-index: 10;
  }
  .input-row {
    display: flex;
    border: 1px solid #c8a84b44;
    background: rgba(0,0,0,0.6);
  }
  input {
    background: transparent; border: none;
    color: #e8c96a;
    font-family: 'Share Tech Mono', monospace;
    font-size: 0.9rem; letter-spacing: 0.3em;
    padding: 0.6rem 1rem; width: 220px;
    outline: none; caret-color: #c8a84b;
  }
  input::placeholder { color: #c8a84b33; }
  button {
    background: transparent; border: none;
    border-left: 1px solid #c8a84b33;
    color: #c8a84b88;
    font-family: 'Share Tech Mono', monospace;
    font-size: 0.7rem; letter-spacing: 0.2em;
    padding: 0.6rem 1rem; cursor: pointer;
    transition: color 0.2s, background 0.2s;
  }
  button:hover { color: #e8c96a; background: #c8a84b11; }
  .msg {
    font-size: 0.58rem; letter-spacing: 0.25em;
    color: #7a3311; text-transform: uppercase;
    min-height: 0.9rem; text-align: center;
  }
  .msg.ok { color: #4a7a4a; }
</style>
</head>
<body>
<div class="bg"></div>
<div class="overlay"></div>
<div class="scanlines"></div>
<div class="vignette"></div>
<div class="ui">
  <div class="input-row">
    <input id="inp" type="text" placeholder="passphrase" autocomplete="off" spellcheck="false" />
    <button onclick="check()">enter</button>
  </div>
  <div class="msg" id="msg"></div>
</div>
<script>
  const CODE = [
    'VEg=',
    'UkVT',
    'SE9MRA=='
  ].map(atob).join('');

  const NEXT = atob('bG10aC45YTQxOTkzamZsa2psS0pfMw==')
    .split('')
    .reverse()
    .join('');

  function check() {
    const v = document.getElementById('inp').value.trim().toUpperCase();
    const m = document.getElementById('msg');

    if (v === CODE.toUpperCase()) {
      m.textContent = 'correct.';
      m.className = 'msg ok';
      setTimeout(() => location.href = NEXT, 1000);
    } else {
      m.textContent = 'wrong.';
      m.className = 'msg';
      document.getElementById('inp').value = '';
    }
  }

  document.getElementById('inp').addEventListener('keydown', e => {
    if (e.key === 'Enter') check();
  });
</script>
</body>

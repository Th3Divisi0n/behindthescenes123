  .overlay { position: fixed; inset: 0; background: rgba(0,0,0,0.45); }
  .scanlines {
    position: fixed; inset: 0;
    background: repeating-linear-gradient(0deg, transparent, transparent 2px, rgba(0,0,0,0.1) 2px, rgba(0,0,0,0.1) 4px);
    pointer-events: none;
  }
  .vignette {
    position: fixed; inset: 0;
    background: radial-gradient(ellipse at center, transparent 35%, rgba(0,0,0,0.9) 100%);
    pointer-events: none;
  }
  .ui {
    position: fixed; inset: 0;
    display: flex; flex-direction: column;
    align-items: center; justify-content: flex-end;
    padding-bottom: 10vh;
    gap: 1rem; z-index: 10;
  }
  .input-row {
    display: flex;
    border: 1px solid #c8a84b44;
    background: rgba(0,0,0,0.65);
  }
  input {
    background: transparent; border: none;
    color: #e8c96a;
    font-family: 'Share Tech Mono', monospace;
    font-size: 0.9rem; letter-spacing: 0.3em;
    padding: 0.6rem 1rem; width: 220px;
    outline: none; caret-color: #c8a84b;
  }
  input::placeholder { color: #c8a84b33; }
  button {
    background: transparent; border: none;
    border-left: 1px solid #c8a84b33;
    color: #c8a84b88;
    font-family: 'Share Tech Mono', monospace;
    font-size: 0.7rem; letter-spacing: 0.2em;
    padding: 0.6rem 1rem; cursor: pointer;
    transition: color 0.2s, background 0.2s;
  }
  button:hover { color: #e8c96a; background: #c8a84b11; }
  .msg {
    font-size: 0.58rem; letter-spacing: 0.25em;
    color: #7a3311; text-transform: uppercase;
    min-height: 0.9rem; text-align: center;
  }
  .msg.ok { color: #4a7a4a; }
  .victory {
    display: none;
    position: fixed; inset: 0;
    background: #0d0a05;
    z-index: 9999;
    align-items: center; justify-content: center;
    flex-direction: column;
    text-align: center; gap: 1.5rem; padding: 2rem;
  }
  .victory.show { display: flex; animation: fin 2s ease forwards; }
  @keyframes fin { from { opacity:0; } to { opacity:1; } }
  .v-title {
    font-size: 0.65rem; color: #c8a84b66;
    letter-spacing: 0.5em; text-transform: uppercase;
  }
  .v-msg {
    font-size: 0.72rem; color: #7a5a1a;
    letter-spacing: 0.15em; line-height: 2.5;
  }
</style>
</head>
<body>
<div class="bg"></div>
<div class="overlay"></div>
<div class="scanlines"></div>
<div class="vignette"></div>
<div class="victory" id="victory">
  <div class="v-title">// end //</div>
  <div class="v-msg">... - ..- -.-. -.- / -... . .-.. --- .-- / - .... . / ... ..- .-. ..-. .- -.-. .<br>.. / .-- .. .-.. .-.. / - --- .-. -- . -. - / -.-- --- ..- / -. . -..- -</div>
</div>
<div class="ui">
  <div class="input-row">
    <input id="inp" type="text" placeholder="passphrase" autocomplete="off" spellcheck="false" />
    <button onclick="check()">enter</button>
  </div>
  <div class="msg" id="msg"></div>
</div>
<script>
  const CODE = [
    'UkU=',
    'U1RBUlQ='
  ].map(atob).join('');

  const NEXT = null;

  function check() {
    const v = document.getElementById('inp').value.trim().toUpperCase();
    const m = document.getElementById('msg');

    if (v === CODE.toUpperCase()) {
      m.textContent = 'correct.';
      m.className = 'msg ok';
      setTimeout(() => {
        if (NEXT) location.href = NEXT;
        else document.getElementById('victory').classList.add('show');
      }, 1000);
    } else {
      m.textContent = 'wrong.';
      m.className = 'msg';
      document.getElementById('inp').value = '';
    }
  }

  document.getElementById('inp').addEventListener('keydown', e => {
    if (e.key === 'Enter') check();
  });
</script>
</body>
